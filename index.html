<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Computer - Aktivasi Optus</title>
    <link rel="stylesheet" href="style.css">
    <!-- Library Barcode Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SG COMPUTER</h1>
        <p>Layanan Aktivasi Digital Cepat</p>
    </div>

    <!-- Area Scanner Kamera -->
    <div id="reader"></div>
    
    <div class="button-group">
        <button id="btn-scan" class="btn-blue" onclick="startScanner()">📸 Scan Barcode</button>
        <button id="btn-stop" class="btn-red" onclick="stopScanner()" style="display:none;">❌ Tutup Kamera</button>
    </div>

    <div class="form-section">
        <div class="input-field">
            <label>Serial Number (SN)</label>
            <input type="text" id="sn_code" placeholder="Masukkan SN (Contoh: F980...)">
        </div>

        <div class="input-field">
            <label>SMCID</label>
            <input type="number" id="smcid_code" placeholder="Masukkan SMCID (Contoh: 8004...)">
        </div>
    </div>

    <div class="preview-card">
        <span>Format Pesan SG Computer:</span>
        <div id="message-preview">Reg AT#6281362462327#[SN]#[SMCID]#mdn01</div>
    </div>

    <button class="btn-whatsapp" onclick="sendToWhatsApp()">
        Kirim Aktivasi via WhatsApp
    </button>
    
    <div class="footer">
        &copy; 2026 - 2027 SG Computer | Digital Solution
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
