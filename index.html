<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Computer - Aktivasi Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- KODE ANTI MALING (CSS) -->
    <style>
        /* Mencegah seleksi teks di seluruh halaman kecuali pada kolom input */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
    </style>
</head>
<!-- KODE ANTI MALING (Disable Klik Kanan & Drag) -->
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

<div class="container">
    <div class="header">
        <h1>SG COMPUTER</h1>
        <p>Digital Activation Center</p>
    </div>

    <!-- Navigasi Menu -->
    <div class="tabs">
        <button id="tab-baru" class="tab-link active" onclick="openTab('baru')">Optus Baru</button>
        <button id="tab-lama" class="tab-link" onclick="openTab('lama')">Digital Lama</button>
    </div>

    <div id="reader"></div>
    
    <div class="button-group">
        <button id="btn-scan" class="btn-blue" onclick="startScanner()">📸 Scan Barcode</button>
        <button id="btn-stop" class="btn-red" onclick="stopScanner()" style="display:none;">❌ Tutup Kamera</button>
    </div>

    <!-- FORM AKTIVASI BARU -->
    <div id="form-baru" class="tab-content">
        <div class="form-section">
            <div class="input-field">
                <label>Serial Number (SN)</label>
                <input type="text" id="sn_baru" placeholder="Scan atau ketik SN...">
            </div>
            <div class="input-field">
                <label>SMCID</label>
                <input type="number" id="smcid_baru" placeholder="Scan atau ketik SMCID...">
            </div>
        </div>
    </div>

    <!-- FORM AKTIVASI LAMA -->
    <div id="form-lama" class="tab-content" style="display:none;">
        <div class="form-section">
            <div class="input-field">
                <label>Serial Number (SN) Lama</label>
                <input type="text" id="sn_lama" placeholder="Scan atau ketik SN Lama...">
            </div>
            <p style="font-size: 11px; color: #888; text-align: center;">Format: Pilih [SN] gol07</p>
        </div>
    </div>

    <div class="preview-card">
        <span>Format Pesan:</span>
        <div id="message-preview">Memuat format...</div>
    </div>

    <button class="btn-whatsapp" onclick="sendToWhatsApp()">
        Kirim Aktivasi Sekarang
    </button>
    
    <div class="footer">
        &copy; SG Computer | PWA Version
    </div>
</div>

<script src="script.js"></script>

<!-- KODE ANTI MALING (JS Shortcut Blocker) -->
<script>
    document.onkeydown = function(e) {
        // Blokir F12 (DevTools)
        if(e.keyCode == 123) return false;
        // Blokir Ctrl+Shift+I (Inspect Element)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        // Blokir Ctrl+Shift+J (Console)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
        // Blokir Ctrl+U (View Source)
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        // Blokir Ctrl+S (Save Page)
        if(e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
    };
</script>

</body>
</html>
